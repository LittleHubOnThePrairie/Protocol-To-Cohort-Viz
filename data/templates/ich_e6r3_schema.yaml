# ICH E6(R3) Appendix B section schema (PTCV-67).
#
# Single source of truth for section definitions, keywords, and
# regex patterns used by the ICH parser pipeline.  Replaces hardcoded
# dicts in llm_retemplater.py and classifier.py.
#
# Loaded once at module import via schema_loader.load_ich_schema().

version: "E6(R3)"
effective_date: "2025-01-06"

sections:
  B.1:
    name: "General Information"
    description: >-
      General Information (title, sponsor, investigator,
      protocol number, version)
    requirement: mandatory
    render_order: 1
    patterns:
      - "\\bgeneral\\s+information\\b"
      - "\\bprotocol\\s+(?:title|number|version|date)\\b"
      - "\\btrial\\s+title\\b"
      - "\\bsponsor\\s+(?:name|address|contact)\\b"
    keywords:
      - "title"
      - "sponsor"
      - "investigator"
      - "protocol number"
      - "version"
      - "phase"
      - "eudract"
      - "euct"
      - "nct"
      - "amendment"
      - "date of protocol"

  B.2:
    name: "Background Information"
    description: >-
      Background Information (rationale, preclinical,
      literature review)
    requirement: mandatory
    render_order: 2
    patterns:
      - "\\bbackground\\b"
      - "\\brationale\\b"
      - "\\bpreclinical\\b"
      - "\\bnonclinical\\b"
      - "\\bliterature\\s+review\\b"
      - "\\bstate\\s+of\\s+(?:the\\s+)?art\\b"
    keywords:
      - "background"
      - "rationale"
      - "preclinical"
      - "nonclinical"
      - "prior studies"
      - "literature"
      - "mechanism of action"
      - "disease background"
      - "current treatment"

  B.3:
    name: "Trial Objectives and Purpose"
    description: >-
      Trial Objectives and Purpose (primary/secondary
      endpoints, hypothesis)
    requirement: mandatory
    render_order: 3
    patterns:
      - "\\bobjectives?\\b"
      - "\\bpurpose\\b"
      - "\\bhypothes[ie]s\\b"
      - "\\bprimary\\s+(?:objectives?|endpoints?|outcomes?)\\b"
      - "\\bsecondary\\s+(?:objectives?|endpoints?|outcomes?)\\b"
      - "\\bestimands?\\b"
      - "\\bstudy\\s+(?:aims?|goals?)\\b"
      - "\\bexploratory\\s+(?:objectives?|endpoints?|outcomes?)\\b"
    keywords:
      - "objective"
      - "purpose"
      - "hypothesis"
      - "aim"
      - "endpoint"
      - "estimand"
      - "study aim"
      - "trial goal"
      - "primary outcome"
      - "secondary outcome"
      - "exploratory endpoint"

  B.4:
    name: "Trial Design"
    description: >-
      Trial Design (design, randomisation, blinding,
      schedule of activities)
    requirement: mandatory
    render_order: 4
    patterns:
      - "\\btrial\\s+design\\b"
      - "\\bstudy\\s+design\\b"
      - "\\brandomis(?:ed|ation)\\b"
      - "\\bdouble.blind\\b"
      - "\\bopen.label\\b"
      - "\\bparallel.group\\b"
      - "\\bcrossover\\b"
      - "\\bstudy\\s+calendar\\b"
      - "\\bschedule\\s+of\\s+(?:activities|assessments)\\b"
      - "\\bassessment\\s+calendar\\b"
    keywords:
      - "design"
      - "randomisation"
      - "blinding"
      - "control"
      - "parallel"
      - "crossover"
      - "open-label"
      - "double-blind"
      - "single-blind"
      - "placebo"
      - "active comparator"
      - "allocation"
      - "study calendar"
      - "schedule of activities"
      - "assessment calendar"

  B.5:
    name: "Selection of Subjects"
    description: >-
      Selection of Subjects (inclusion/exclusion criteria,
      eligibility)
    requirement: mandatory
    render_order: 5
    patterns:
      - "\\b(?:inclusion|exclusion)\\s+criteria\\b"
      - "\\beligibility\\s+criteria\\b"
      - "\\bselection\\s+of\\s+(?:subjects|patients|participants)\\b"
      - "\\bentry\\s+criteria\\b"
    keywords:
      - "inclusion criteria"
      - "exclusion criteria"
      - "eligibility"
      - "subject selection"
      - "patient population"
      - "age range"
      - "diagnosis"
      - "contraindication"

  B.6:
    name: "Discontinuation of Trial Intervention and Participant Withdrawal"
    description: >-
      Discontinuation of Trial Intervention and Participant
      Withdrawal (discontinuation, withdrawal, stopping rules)
    requirement: mandatory
    render_order: 6
    patterns:
      - "\\bdiscontinuation\\b"
      - "\\bwithdrawal\\b"
      - "\\btreatment\\s+(?:discontinuation|withdrawal|termination)\\b"
      - "\\bstopping\\s+rules?\\b"
      - "\\bdrop.?out\\b"
      - "\\blost\\s+to\\s+follow.up\\b"
      - "\\bsubject\\s+(?:discontinuation|withdrawal)\\b"
    keywords:
      - "discontinuation"
      - "withdrawal"
      - "stopping rules"
      - "treatment termination"
      - "dropout"
      - "lost to follow-up"
      - "participant withdrawal"
      - "premature discontinuation"
      - "study completion"
      - "early termination"

  B.7:
    name: "Treatment of Participants"
    description: >-
      Treatment of Participants (treatment schedule, dosing,
      IMP administration, concomitant medication)
    requirement: mandatory
    render_order: 7
    patterns:
      - "\\btreatment\\s+(?:schedule|regimen|administration)\\b"
      - "\\bdose(?:s|ing|age)?\\b"
      - "\\bconcomitant\\s+(?:medication|treatment|therapy)\\b"
      - "\\bstudy\\s+treatment\\b"
      - "\\binvestigational\\s+(?:product|medicinal\\s+product)\\b"
      - "\\bvasopressor(?:s)?\\b"
      - "\\bfluid\\s+(?:management|therapy|resuscitation)\\b"
    keywords:
      - "dose"
      - "dosing"
      - "administration"
      - "regimen"
      - "investigational product"
      - "IMP"
      - "treatment schedule"
      - "concomitant medication"
      - "rescue medication"
      - "vasopressor"
      - "vasopressors"
      - "fluid management"

  B.8:
    name: "Assessment of Efficacy"
    description: >-
      Assessment of Efficacy (efficacy endpoints, clinical
      outcomes, response criteria, survival)
    requirement: mandatory
    render_order: 8
    patterns:
      - "\\befficacy\\s+(?:assessments?|endpoints?|evaluations?)\\b"
      - "\\bprimary\\s+efficacy\\b"
      - "\\bclinical\\s+outcome\\b"
      - "\\bresponse\\s+(?:criteria|rate|assessment)\\b"
      - "\\bsurvival\\b"
      - "\\bremission\\b"
      - "\\bmeasurements?\\b"
      - "\\bh[ae]emodynamic(?:s)?\\b"
      - "\\bblood\\s+(?:draws?|sampl(?:es?|ing))\\b"
      - "\\bclinical\\s+(?:assessments?|procedures?)\\b"
      - "\\bstudy\\s+(?:assessments?|procedures?)\\b"
    keywords:
      - "efficacy assessment"
      - "clinical response"
      - "tumour response"
      - "progression-free survival"
      - "overall survival"
      - "remission"
      - "disease-free"
      - "response rate"
      - "measurements"
      - "hemodynamics"
      - "haemodynamics"
      - "blood sampling"
      - "blood draws"
      - "study assessments"
      - "clinical assessments"

  B.9:
    name: "Assessment of Safety"
    description: >-
      Assessment of Safety (adverse events, SAEs, vital
      signs, laboratory tests, ECG, toxicity)
    requirement: mandatory
    render_order: 9
    patterns:
      - "\\bsafety\\s+(?:assessments?|monitoring|evaluations?|considerations?|measures?|parameters?)\\b"
      - "\\badverse\\s+(?:event|reaction|effect)\\b"
      - "\\bserious\\s+adverse\\b"
      - "\\bvital\\s+signs?\\b"
      - "\\blaboratory\\s+(?:tests?|assessments?|parameters?)\\b"
      - "\\becg\\b"
      - "\\btoxicity\\b"
    keywords:
      - "adverse event"
      - "adverse reaction"
      - "SAE"
      - "safety monitoring"
      - "safety considerations"
      - "safety parameters"
      - "vital signs"
      - "laboratory"
      - "ECG"
      - "toxicity"
      - "tolerability"
      - "DSMB"
      - "SUSAR"

  B.10:
    name: "Statistics"
    description: >-
      Statistics (statistical methods, sample size, power
      calculation, analysis populations)
    requirement: mandatory
    render_order: 10
    patterns:
      - "\\bstatistical\\s+(?:methods?|analysis|plan)\\b"
      - "\\bsample\\s+size\\b"
      - "\\bpower\\s+(?:calculation|analysis)\\b"
      - "\\banalysis\\s+(?:population|set)\\b"
      - "\\bintention.to.treat\\b"
      - "\\bper.protocol\\b"
    keywords:
      - "statistical analysis"
      - "sample size"
      - "power calculation"
      - "significance level"
      - "analysis population"
      - "intention-to-treat"
      - "per-protocol"
      - "missing data"
      - "multiplicity"
      - "interim analysis"

  B.11:
    name: "Direct Access to Source Data/Documents"
    description: >-
      Direct Access to Source Data/Documents (source data
      verification, direct access, source documents)
    requirement: mandatory
    render_order: 11
    patterns:
      - "\\bsource\\s+data\\s+(?:verification|access)\\b"
      - "\\bdirect\\s+access\\b"
      - "\\bsource\\s+(?:document|record)\\b"
    keywords:
      - "source data verification"
      - "direct access"
      - "source document"
      - "source record"

  B.12:
    name: "Quality Control and Quality Assurance"
    description: >-
      Quality Control and Quality Assurance (monitoring,
      audit, inspection, GCP compliance, data integrity)
    requirement: mandatory
    render_order: 12
    patterns:
      - "\\bquality\\s+(?:control|assurance|management)\\b"
      - "\\baudit\\b"
      - "\\binspection\\b"
      - "\\bmonitoring\\s+(?:plan|visits?|procedures?)\\b"
      - "\\bdata\\s+(?:management|governance|integrity)\\b"
      - "\\bGCP\\b"
      - "\\bICH\\s+E6\\b"
    keywords:
      - "quality control"
      - "quality assurance"
      - "audit"
      - "inspection"
      - "monitoring"
      - "GCP"
      - "ICH E6"
      - "data management"
      - "data integrity"
      - "regulatory compliance"
      - "site monitoring"
      - "risk-based monitoring"

  B.13:
    name: "Ethics"
    description: >-
      Ethics (ethics committee, IRB approval, informed
      consent process, subject information)
    requirement: mandatory
    render_order: 13
    patterns:
      - "\\bethics\\s+(?:committee|review|approval)\\b"
      - "\\bIRB\\b"
      - "\\bIEC\\b"
      - "\\binformed\\s+consent\\b"
      - "\\bsubject\\s+information\\s+(?:sheet|leaflet)\\b"
      - "\\bindependent\\s+ethics\\b"
    keywords:
      - "ethics"
      - "ethics committee"
      - "IRB"
      - "IEC"
      - "informed consent"
      - "subject information"
      - "ethical approval"
      - "consent form"
      - "assent"

  B.14:
    name: "Data Handling and Record Keeping"
    description: >-
      Data Handling and Record Keeping (CRF, data
      management, electronic records, archiving)
    requirement: mandatory
    render_order: 14
    patterns:
      - "\\bdata\\s+handling\\b"
      - "\\brecord\\s+keeping\\b"
      - "\\bcase\\s+report\\s+form\\b"
      - "\\bCRF\\b"
      - "\\beCRF\\b"
      - "\\belectronic\\s+(?:data|record)\\b"
      - "\\barchiv(?:ing|e)\\b"
      - "\\bdata\\s+(?:entry|collection|storage)\\b"
      - "\\bessential\\s+documents?\\b"
    keywords:
      - "data handling"
      - "record keeping"
      - "CRF"
      - "case report form"
      - "eCRF"
      - "data entry"
      - "electronic records"
      - "archiving"
      - "data retention"
      - "essential documents"
      - "data collection"
      - "data storage"
      - "regulatory filing"

  B.15:
    name: "Financing and Insurance"
    description: >-
      Financing and Insurance (financial disclosure,
      insurance, compensation, indemnity, funding)
    requirement: mandatory
    render_order: 15
    patterns:
      - "\\bfinanc(?:ing|ial)\\b"
      - "\\binsurance\\b"
      - "\\bcompensation\\b"
      - "\\bindemnity\\b"
    keywords:
      - "financing"
      - "financial disclosure"
      - "insurance"
      - "compensation"
      - "indemnity"
      - "funding"

  B.16:
    name: "Publication Policy"
    description: >-
      Publication Policy (publication plan, publication
      agreement, authorship)
    requirement: recommended
    render_order: 16
    patterns:
      - "\\bpublication\\s+(?:policy|plan|agreement)\\b"
      - "\\bauthorship\\b"
    keywords:
      - "publication"
      - "publication policy"
      - "publication plan"
      - "authorship"

# Configurable thresholds, patterns, and constants (PTCV-69).
# Centralises values that were previously hardcoded across multiple files.
configuration:
  # Confidence threshold below which human review is flagged.
  # Replaces _REVIEW_THRESHOLD (llm_retemplater.py) and
  # REVIEW_THRESHOLD (classifier.py).
  review_threshold_default: 0.70

  # Classification cascade threshold (PTCV-161).
  # Sections with local confidence >= this are accepted without Sonnet.
  # Falls back to review_threshold_default if not specified.
  cascade_threshold_default: 0.70

  section_thresholds:
    B.4: 0.85   # SoA-critical — higher bar
    B.5: 0.80   # Eligibility criteria — important

  # Sections receiving full-text + table enrichment (PTCV-52).
  # Replaces PRIORITY_SECTIONS frozenset in priority_sections.py.
  priority_sections: [B.4, B.5, B.10, B.14]

  # SoA table detection parameters.
  # Replaces _VISIT_RE, _MIN_SOA_COLUMNS, _MIN_SOA_VISIT_MATCHES
  # in priority_sections.py.
  soa_detection:
    visit_pattern: "\\bvisit\\b|\\bday\\s*-?\\d+|\\bweek\\s*-?\\d+|\\bmonth\\s*\\d+|\\bscreening\\b|\\bbaseline\\b|\\bfollow[\\s-]*up\\b|\\bdischarge\\b|\\badmission\\b|\\brandomiz|\\bend\\s+of\\s+(?:study|treatment|trial)\\b|\\beot\\b|\\beos\\b"
    min_columns: 5
    min_visit_matches: 3

  # Coverage reviewer boilerplate exclusion.
  # Replaces _BOILERPLATE_RE and _MIN_SENTENCE_LEN in coverage_reviewer.py.
  coverage:
    boilerplate_patterns:
      - "page\\s+\\d+"
      - "confidential"
      - "proprietary"
      - "version\\s+\\d"
      - "date\\s*:?\\s*\\d"
      - "table\\s+of\\s+contents"
      - "protocol\\s+number"
      - "eudract\\s+number"
      - "list\\s+of\\s+(?:tables|figures|abbreviations)"
    min_sentence_length: 20

# Stage-specific prompt configurations (PTCV-68).
# Each stage lists the ICH sections it needs and the rendering format.
#   full    — prose "  B.X: Description (...)" lines (matches legacy prompt)
#   compact — compressed XML (<ich_e6r3><section code="B.X" ...>)
stage_prompts:
  retemplater:
    sections: [B.1, B.2, B.3, B.4, B.5, B.6, B.7, B.8, B.9, B.10, B.11, B.12, B.13, B.14, B.15, B.16]
    format: full
  coverage_reviewer:
    sections: [B.3, B.4, B.5]
    format: compact
  sdtm_generator:
    sections: [B.4, B.7, B.8, B.9]
    format: compact
  annotation_service:
    sections: [B.4, B.5, B.8]
    format: compact
